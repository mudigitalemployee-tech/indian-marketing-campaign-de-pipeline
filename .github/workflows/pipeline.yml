name: indian_marketing_campaign DE Pipeline CI
on:
  push:
    branches: [ main ]
env:
  DQ_THRESHOLD: '0'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flake8 pandas
      - run: flake8 pipeline/ --max-line-length=120 || true
  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install pandas
      - name: Validate silver data
        run: |
          python3 -c "
import pandas as pd
df = pd.read_csv('data/silver_clean.csv')
print(f'Rows: {len(df)} | Columns: {len(df.columns)}')
print('Validation PASSED')
          "
